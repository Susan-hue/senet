app = "senet-backend-jnb"
primary_region = "jnb"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
