[tool.ruff]
line-length = 100
target-version = "py312"
src = ["."]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "DJ", "UP", "C4"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests.py" = ["S101"]
"**/scoping.py" = ["DJ012"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.bandit]
exclude_dirs = ["migrations", ".venv", "venv"]
exclude = ["*/tests.py", "*/test_*.py", "*_test.py"]

[tool.bandit.assert_used]
skips = ["**/tests.py"]
